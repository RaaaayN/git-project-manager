# yaml-language-server: $schema=schemas/project-os-agent.schema.json
version: 1
templates_dir: templates
dry_run: true

webhook:
  enabled: true
  host: 0.0.0.0
  port: 8080
  path: /webhooks/gitlab
  secret_env: GITLAB_WEBHOOK_SECRET

policy:
  allowed_actions:
    - open_merge_request
    - create_issue
    - comment_issue
    - update_documentation
    - write_adr
  forbidden_actions:
    - delete_file
    - direct_code_modification
    - modify_architecture_without_docs

phase3:
  stale_days: 14
  next_steps_default_owner: "@team-core"
  llm:
    enabled: false
    provider: gemini
    model: gemini-2.0-flash
    api_key_env: GEMINI_API_KEY
    timeout_seconds: 20
  mcp:
    enabled: false
    context_file: .mcp/context.json

phase4:
  enabled: true
  auto_sync_docs: true
  mr_title_prefix: "[Agent]"
  issue_title_prefix: "[Agent][Tracking]"
  comment_on_source_event: true

phase5:
  enabled: true
  audit:
    enabled: true
    log_file: .project-os-agent/audit.log.jsonl
    redact_keys:
      - token
      - authorization
      - private_token
      - api_key
      - secret
    max_entry_chars: 2000
  guardrails:
    enabled: true
    safe_write: true
    allowed_write_paths: []
    blocked_path_prefixes:
      - .git/
      - .env
      - secrets/
      - .mcp/secrets/
    secret_patterns:
      - "(?i)glpat-[A-Za-z0-9\\-_]{16,}"
      - "(?i)AIza[0-9A-Za-z\\-_]{35}"
      - "(?i)(api[_-]?key|token|secret)\\s*[:=]\\s*[\\\"']?[A-Za-z0-9_\\-]{12,}"
    max_payload_bytes: 524288
  rate_limit:
    enabled: true
    state_file: .project-os-agent/rate-limit.json
    window_seconds: 60
    max_events: 30
  kpi:
    enabled: true
    report_dir: .project-os-agent/reports
    report_prefix: weekly-kpi
    rolling_days: 7

gitlab:
  enabled: false
  api_url: https://gitlab.com/api/v4
  project_id: your-group/your-project
  token_env: GITLAB_TOKEN
  target_branch: main
  branch_prefix: project-os-agent
  labels:
    - project-os-agent

managed_files:
  - template: AGENTS.md
    target: AGENTS.md
  - template: API_SPEC.md
    target: API_SPEC.md
  - template: ARCHITECTURE.md
    target: ARCHITECTURE.md
  - template: CLAUDE.md
    target: CLAUDE.md
  - template: DECISIONS.md
    target: DECISIONS.md
  - template: DOCUMENTATION.md
    target: DOCUMENTATION.md
  - template: PRODUCT_SPEC.md
    target: PRODUCT_SPEC.md
  - template: PROJECT_STATUS.md
    target: PROJECT_STATUS.md
  - template: README.md
    target: README.md
  - template: ROADMAP.md
    target: ROADMAP.md
  - template: SECURITY.md
    target: SECURITY.md

placeholders:
  "<SaaS Product Name>": "Project OS Agent"
  "<repo-url>": "https://gitlab.com/your-group/your-project"
